<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Cliente - Mi ISP</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- REGISTRO -->
  <section class="beneficios">
    <h2>Registro de Cliente</h2>
    <form class="card" style="max-width:400px;margin:0 auto;">
      <label>Nombre:</label>
      <input type="text" placeholder="Tu nombre" required>
      <label>Apellido:</label>
      <input type="text" placeholder="Tu apellido" required>
      <label>Email:</label>
      <input type="email" placeholder="Tu correo" required>
      <label>Teléfono:</label>
      <input type="text" placeholder="Tu teléfono" required>
      <label>Contraseña:</label>
      <input type="password" placeholder="Crea una contraseña" required>
      <button type="submit" class="btn-primary">Registrarme</button>
    </form>
  </section>
</body>
</html>
