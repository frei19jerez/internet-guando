<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Mi ISP</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Logo ISP">
      <h1>Mi ISP</h1>
    </div>
    <nav class="navbar">
      <ul id="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="planes.html">Planes</a></li>

    </nav>
  </header>

  <!-- CONTACTO -->
  <main>
    <section class="beneficios">
      <h2>Contáctanos</h2>
      <form class="card" style="max-width:500px;margin:0 auto;">
        <label for="nombre">Nombre:</label>
        <input id="nombre" type="text" placeholder="Tu nombre" required>

        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="Tu correo" required>

        <label for="telefono">Teléfono:</label>
        <input id="telefono" type="text" placeholder="Tu teléfono">

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" placeholder="Escribe tu mensaje..." required></textarea>

        <button type="submit" class="btn-primary">Enviar</button>
      </form>

      <a href="https://wa.me/573001112233" target="_blank" class="btn-primary" style="margin-top:20px;display:inline-block;">
        📲 WhatsApp Directo
      </a>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
