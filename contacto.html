<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacto - TU-WIFI</title>
  <meta name="description" content="Escríbenos por formulario o WhatsApp. Atención rápida de TU-WIFI." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">
      <!-- Cambia el nombre del archivo si tu logo se llama distinto -->
      <img src="imagen/tu-wife.png" alt="Logo TU-WIFI" loading="lazy" />
      <h1>TU-WIFI</h1>
    </div>

    <nav class="navbar" aria-label="Principal">
      <ul id="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="planes.html">Planes</a></li>
        <li><a href="cobertura.html">Cobertura</a></li>
        <li><a href="contacto.html" class="active" aria-current="page">Contacto</a></li>
        <li><a href="cliente/login.html" class="btn">Área Clientes</a></li>
      </ul>
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="menu">
        &#9776;
      </button>
    </nav>
  </header>

  <!-- CONTACTO -->
  <main>
    <section class="beneficios">
      <h2>Contáctanos</h2>

      <form id="formContacto" class="card form-card" novalidate>
        <div class="field">
          <label for="nombre">Nombre</label>
          <input id="nombre" name="nombre" type="text" placeholder="Tu nombre" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="tucorreo@dominio.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="telefono">Teléfono (Colombia)</label>
          <input id="telefono" name="telefono" type="tel" placeholder="3009020221"
                 inputmode="numeric" pattern="3[0-9]{9}" maxlength="10" value="" required />
          <small>Ej: 3XXXXXXXXX (solo números)</small>
        </div>

        <div class="field">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="4" placeholder="Quiero información del servicio…" required></textarea>
        </div>

        <button type="submit" class="btn-primary glow">Enviar por WhatsApp</button>

        <div class="alt-links">
          <a id="linkWapp" href="#" target="_blank" rel="noopener" class="btn-outline">📲 WhatsApp directo</a>
          <a id="linkTel" href="#" class="btn-outline">📞 Llamar</a>
          <a id="linkMail" href="mailto:soporte@tu-wifi.com?subject=Contacto%20TU-WIFI" class="btn-outline">✉️ Enviar email</a>
        </div>
      </form>
    </section>
  </main>

  <!-- BOTÓN FLOTANTE WHATSAPP -->
  <a id="wappFloat" href="#" target="_blank" rel="noopener" aria-label="Chatear por WhatsApp" class="wapp-float">
    WhatsApp
  </a>

  <!-- FOOTER -->
  <footer>
    <p>&copy; <span id="year"></span> TU-WIFI — Todos los derechos reservados</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
